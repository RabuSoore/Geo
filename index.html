<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kisi-Kisi Geografi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --earth: #2D4A3E;
    --sky: #4A7C9B;
    --lava: #C0392B;
    --sand: #F5F0E8;
    --stone: #8B7355;
    --fog: #E8E4DC;
    --ink: #1A1A1A;
    --water: #2980B9;
    --cloud: #ECF0F1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
  }

  /* NAV */
  #nav-panel {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 260px;
    background: var(--earth);
    color: white;
    overflow-y: auto;
    z-index: 100;
    display: flex;
    flex-direction: column;
    transition: transform 0.3s;
  }

  #nav-panel h2 {
    font-family: 'Lora', serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 20px 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    letter-spacing: 0.03em;
    color: #a8d5bc;
  }

  .nav-item {
    padding: 10px 18px;
    cursor: pointer;
    font-size: 0.78rem;
    line-height: 1.4;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    transition: background 0.15s;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .nav-item:hover { background: rgba(255,255,255,0.1); }
  .nav-item.active { background: var(--lava); }

  .nav-num {
    font-size: 0.68rem;
    font-weight: 700;
    color: #a8d5bc;
    min-width: 22px;
    margin-top: 1px;
  }

  .nav-item.active .nav-num { color: #fff; }

  /* MAIN */
  #main {
    margin-left: 260px;
    min-height: 100vh;
  }

  /* PAGE */
  .page {
    display: none;
    min-height: 100vh;
    padding: 0;
    animation: fadeIn 0.3s ease;
  }
  .page.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* PAGE HEADER */
  .page-header {
    padding: 48px 52px 36px;
    position: relative;
    overflow: hidden;
  }

  .page-header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 300px; height: 300px;
    border-radius: 50%;
    opacity: 0.06;
    background: white;
  }

  .topic-num {
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.75;
    margin-bottom: 10px;
  }

  .page-header h1 {
    font-family: 'Lora', serif;
    font-size: 2rem;
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 12px;
  }

  .page-header p.subtitle {
    font-size: 0.9rem;
    opacity: 0.8;
    max-width: 560px;
    line-height: 1.6;
  }

  /* CONTENT AREA */
  .page-content {
    padding: 36px 52px 60px;
    max-width: 860px;
  }

  /* CARD */
  .card {
    background: white;
    border-radius: 12px;
    padding: 24px 28px;
    margin-bottom: 20px;
    border-left: 4px solid var(--stone);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .card h3 {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 12px;
    color: var(--earth);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card h3 .icon { font-size: 1.1rem; }

  .card p {
    font-size: 0.88rem;
    line-height: 1.75;
    color: #333;
    margin-bottom: 8px;
  }

  .card p:last-child { margin-bottom: 0; }

  /* TABLE */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.84rem;
    margin-top: 4px;
  }

  .compare-table th {
    background: var(--earth);
    color: white;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
  }

  .compare-table td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--fog);
    vertical-align: top;
    line-height: 1.55;
  }

  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:nth-child(even) td { background: #fafafa; }

  /* PILL LIST */
  .pill-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 8px;
  }

  .pill {
    background: var(--fog);
    border-radius: 999px;
    padding: 5px 14px;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--earth);
    border: 1px solid #ddd;
  }

  .pill.red { background: #fde8e8; color: var(--lava); border-color: #f5c6c6; }
  .pill.blue { background: #e3f0f8; color: var(--sky); border-color: #b8d4e8; }
  .pill.green { background: #e3f2ec; color: var(--earth); border-color: #a8d5bc; }

  /* DEFINITION LIST */
  .def-list { margin-top: 6px; }
  .def-item { margin-bottom: 10px; }
  .def-term {
    font-weight: 700;
    font-size: 0.88rem;
    color: var(--earth);
    margin-bottom: 2px;
  }
  .def-desc {
    font-size: 0.84rem;
    line-height: 1.65;
    color: #444;
    padding-left: 12px;
    border-left: 2px solid var(--fog);
  }

  /* TWO COL */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 4px;
  }

  .col-box {
    background: var(--fog);
    border-radius: 8px;
    padding: 16px 18px;
  }

  .col-box h4 {
    font-size: 0.82rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--earth);
    margin-bottom: 8px;
  }

  .col-box ul {
    padding-left: 16px;
    font-size: 0.83rem;
    line-height: 1.7;
    color: #333;
  }

  /* NAV BUTTONS */
  .nav-buttons {
    display: flex;
    gap: 12px;
    padding: 0 52px 48px;
    align-items: center;
  }

  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.15s;
  }

  .btn-prev {
    background: var(--fog);
    color: var(--ink);
    border: 1px solid #ccc;
  }

  .btn-prev:hover { background: #ddd; }

  .btn-next {
    background: var(--earth);
    color: white;
  }

  .btn-next:hover { background: #1e3329; }

  .page-counter {
    font-size: 0.82rem;
    color: #888;
    margin-left: auto;
  }

  /* HIGHLIGHT BOX */
  .highlight {
    background: linear-gradient(135deg, #e3f0f8, #eef6f0);
    border: 1px solid #b8d4e8;
    border-radius: 8px;
    padding: 14px 18px;
    margin-top: 12px;
    font-size: 0.84rem;
    line-height: 1.7;
    color: #2a4a6b;
  }

  .highlight strong { color: var(--earth); }

  /* THEME COLORS per topic group */
  .theme-litosfer .page-header { background: linear-gradient(135deg, #2D4A3E, #3d6352); color: white; }
  .theme-litosfer .card { border-left-color: #2D4A3E; }
  .theme-vulkan .page-header { background: linear-gradient(135deg, #7b2d2d, #C0392B); color: white; }
  .theme-vulkan .card { border-left-color: #C0392B; }
  .theme-atmosfer .page-header { background: linear-gradient(135deg, #1c4e78, #4A7C9B); color: white; }
  .theme-atmosfer .card { border-left-color: #4A7C9B; }
  .theme-hidrosfer .page-header { background: linear-gradient(135deg, #1a5276, #2980B9); color: white; }
  .theme-hidrosfer .card { border-left-color: #2980B9; }
  .theme-default .page-header { background: linear-gradient(135deg, #5D4037, var(--stone)); color: white; }
  .theme-default .card { border-left-color: var(--stone); }

  /* SCROLL */
  #nav-panel::-webkit-scrollbar { width: 4px; }
  #nav-panel::-webkit-scrollbar-track { background: transparent; }
  #nav-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

  @media (max-width: 700px) {
    #nav-panel { transform: translateX(-260px); }
    #nav-panel.open { transform: translateX(0); }
    #main { margin-left: 0; }
    .page-header { padding: 32px 24px 24px; }
    .page-content { padding: 24px 24px 40px; }
    .nav-buttons { padding: 0 24px 40px; }
    .two-col { grid-template-columns: 1fr; }
    #menu-toggle {
      display: flex !important;
    }
  }

  #menu-toggle {
    display: none;
    position: fixed;
    top: 14px; left: 14px;
    z-index: 200;
    background: var(--earth);
    color: white;
    border: none;
    border-radius: 8px;
    width: 40px; height: 40px;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<button id="menu-toggle" onclick="toggleNav()">☰</button>

<!-- SIDEBAR NAV -->
<nav id="nav-panel">
  <h2>📚 Kisi-Kisi Geografi</h2>
  <div id="nav-links"></div>
</nav>

<!-- MAIN CONTENT -->
<main id="main">
  <div id="pages"></div>
</main>

// Render nav
const navLinks = document.getElementById('nav-links');
topics.forEach((t, i) => {
  const el = document.createElement('div');
  el.className = 'nav-item' + (i === 0 ? ' active' : '');
  el.innerHTML = `<span class="nav-num">${t.id}</span><span>${t.title}</span>`;
  el.onclick = () => showPage(i);
  navLinks.appendChild(el);
});

// Render pages
const pagesEl = document.getElementById('pages');
topics.forEach((t, i) => {
  const div = document.createElement('div');
  div.className = 'page ' + t.theme + (i === 0 ? ' active' : '');
  div.id = 'page-' + i;
  div.innerHTML = `
    <div class="page-header">
      <div class="topic-num">Topik ${t.id} dari ${topics.length}</div>
      <h1>${t.title}</h1>
      <p class="subtitle">${t.subtitle}</p>
    </div>
    <div class="page-content">${t.content}</div>
    <div class="nav-buttons">
      ${i > 0 ? `<button class="btn btn-prev" onclick="showPage(${i-1})">← Sebelumnya</button>` : ''}
      ${i < topics.length-1 ? `<button class="btn btn-next" onclick="showPage(${i+1})">Berikutnya →</button>` : '<button class="btn btn-next" style="background:#888;cursor:default">Selesai ✓</button>'}
      <span class="page-counter">${i+1} / ${topics.length}</span>
    </div>
  `;
  pagesEl.appendChild(div);
});

function showPage(index) {
  document.querySelectorAll('.page').forEach((p, i) => {
    p.classList.toggle('active', i === index);
  });
  document.querySelectorAll('.nav-item').forEach((n, i) => {
    n.classList.toggle('active', i === index);
  });
  window.scrollTo(0, 0);
  // Close nav on mobile
  document.getElementById('nav-panel').classList.remove('open');
}

function toggleNav() {
  document.getElementById('nav-panel').classList.toggle('open');
}
</script>
