<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kisi-Kisi Geografi — Panduan Belajar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand:    #F7F3EE;
    --ink:     #1C1C1C;
    --muted:   #6B6460;
    --line:    #E4DDD6;

    /* theme palettes */
    --litosfer-bg:   #1E3A2F;
    --litosfer-mid:  #2D5542;
    --litosfer-acc:  #6FCF97;

    --vulkan-bg:     #3B1A1A;
    --vulkan-mid:    #6B2A2A;
    --vulkan-acc:    #FF8A65;

    --atmosfer-bg:   #162844;
    --atmosfer-mid:  #1F4080;
    --atmosfer-acc:  #56CCF2;

    --hidrosfer-bg:  #0D2B45;
    --hidrosfer-mid: #1565A0;
    --hidrosfer-acc: #4FC3F7;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── SIDEBAR ─────────────────────────────────────── */
  #sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 272px;
    background: #141414;
    overflow-y: auto;
    z-index: 100;
    display: flex;
    flex-direction: column;
    transition: transform .3s ease;
  }

  #sidebar::-webkit-scrollbar { width: 3px; }
  #sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

  .sidebar-logo {
    padding: 22px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,.07);
  }
  .sidebar-logo span {
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    color: #666;
    display: block;
    margin-bottom: 4px;
  }
  .sidebar-logo h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: #fff;
    font-weight: 700;
  }

  .section-label {
    padding: 16px 20px 6px;
    font-size: .62rem;
    font-weight: 700;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #555;
  }

  .nav-item {
    padding: 9px 20px;
    cursor: pointer;
    font-size: .76rem;
    color: #aaa;
    transition: all .15s;
    border-left: 2px solid transparent;
    line-height: 1.4;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .nav-item:hover { color: #fff; background: rgba(255,255,255,.04); }
  .nav-item.active { color: #fff; border-left-color: currentColor; background: rgba(255,255,255,.06); }
  .nav-item.active.t-litosfer  { border-left-color: var(--litosfer-acc);  color: var(--litosfer-acc); }
  .nav-item.active.t-vulkan    { border-left-color: var(--vulkan-acc);    color: var(--vulkan-acc); }
  .nav-item.active.t-atmosfer  { border-left-color: var(--atmosfer-acc);  color: var(--atmosfer-acc); }
  .nav-item.active.t-hidrosfer { border-left-color: var(--hidrosfer-acc); color: var(--hidrosfer-acc); }

  .nav-num {
    min-width: 18px;
    font-size: .65rem;
    font-weight: 700;
    opacity: .45;
    margin-top: 1px;
  }
  .nav-item.active .nav-num { opacity: .7; }

  /* ── MAIN ────────────────────────────────────────── */
  #main {
    margin-left: 272px;
    min-height: 100vh;
  }

  /* ── PAGE ────────────────────────────────────────── */
  .page { display: none; animation: fadeUp .35s ease; }
  .page.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HERO BANNER ─────────────────────────────────── */
  .hero {
    position: relative;
    height: 320px;
    overflow: hidden;
  }

  .hero-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(.55) saturate(1.1);
    transition: transform 8s ease;
  }
  .page.active .hero-img { transform: scale(1.04); }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,.75) 0%, rgba(0,0,0,.2) 60%, transparent 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 28px 40px;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(255,255,255,.7);
    background: rgba(255,255,255,.12);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.15);
    border-radius: 999px;
    padding: 5px 12px;
    margin-bottom: 10px;
    width: fit-content;
  }

  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 8px;
    text-shadow: 0 2px 12px rgba(0,0,0,.4);
  }

  .hero p {
    font-size: .85rem;
    color: rgba(255,255,255,.75);
    max-width: 520px;
    line-height: 1.6;
  }

  /* ── CONTENT AREA ────────────────────────────────── */
  .page-content {
    padding: 32px 40px 56px;
    max-width: 900px;
  }

  /* ── PHOTO STRIP ─────────────────────────────────── */
  .photo-strip {
    display: grid;
    gap: 10px;
    margin-bottom: 28px;
    border-radius: 14px;
    overflow: hidden;
  }
  .photo-strip.cols-2 { grid-template-columns: 1fr 1fr; }
  .photo-strip.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .photo-strip img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    transition: transform .4s ease;
  }
  .photo-strip img:hover { transform: scale(1.03); }

  .photo-box {
    overflow: hidden;
    border-radius: 10px;
    position: relative;
  }
  .photo-box figcaption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,.7));
    color: rgba(255,255,255,.85);
    font-size: .68rem;
    font-weight: 500;
    padding: 18px 10px 8px;
    line-height: 1.3;
  }

  /* ── CARD ────────────────────────────────────────── */
  .card {
    background: #fff;
    border-radius: 14px;
    padding: 22px 26px;
    margin-bottom: 18px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 4px 20px rgba(0,0,0,.04);
    border: 1px solid var(--line);
  }

  .card h3 {
    font-size: .92rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }

  .card p {
    font-size: .84rem;
    line-height: 1.75;
    color: #444;
    margin-bottom: 8px;
  }
  .card p:last-child { margin-bottom: 0; }

  /* accent left border by theme */
  .page.theme-litosfer  .card { border-left: 3px solid var(--litosfer-acc); }
  .page.theme-vulkan    .card { border-left: 3px solid var(--vulkan-acc); }
  .page.theme-atmosfer  .card { border-left: 3px solid var(--atmosfer-acc); }
  .page.theme-hidrosfer .card { border-left: 3px solid var(--hidrosfer-acc); }

  /* ── TABLE ───────────────────────────────────────── */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: .82rem;
    margin-top: 2px;
    border-radius: 8px;
    overflow: hidden;
  }

  .compare-table th {
    background: var(--ink);
    color: #fff;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: .78rem;
    letter-spacing: .03em;
  }

  .compare-table td {
    padding: 9px 14px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
    line-height: 1.6;
    color: #333;
  }

  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table tr:nth-child(even) td { background: #fafaf8; }

  /* ── PILLS ───────────────────────────────────────── */
  .pill-list { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 8px; }

  .pill {
    background: var(--sand);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 13px;
    font-size: .76rem;
    font-weight: 600;
    color: #444;
  }

  .pill.red   { background: #FEF0ED; color: #C0392B; border-color: #f5c0b8; }
  .pill.blue  { background: #EBF5FB; color: #1A6FA8; border-color: #b8d4e8; }
  .pill.green { background: #EAFAF1; color: #1D6A45; border-color: #a0d9b5; }
  .pill.amber { background: #FEF9E7; color: #7D6608; border-color: #f0dc8a; }

  /* ── DEF LIST ────────────────────────────────────── */
  .def-list { margin-top: 4px; }
  .def-item { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
  .def-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

  .def-term {
    font-weight: 700;
    font-size: .84rem;
    color: var(--ink);
    margin-bottom: 3px;
  }

  .def-desc {
    font-size: .81rem;
    line-height: 1.7;
    color: #555;
    padding-left: 12px;
    border-left: 2px solid var(--line);
  }

  /* ── TWO COL ─────────────────────────────────────── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 6px;
  }

  .col-box {
    background: var(--sand);
    border-radius: 10px;
    padding: 15px 17px;
    border: 1px solid var(--line);
  }

  .col-box h4 {
    font-size: .76rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--ink);
    margin-bottom: 8px;
  }

  .col-box ul {
    padding-left: 15px;
    font-size: .8rem;
    line-height: 1.75;
    color: #444;
  }

  /* ── HIGHLIGHT ───────────────────────────────────── */
  .highlight {
    background: linear-gradient(135deg, #EBF5FB, #EAFAF1);
    border: 1px solid #b8ddc8;
    border-radius: 10px;
    padding: 14px 18px;
    margin-top: 12px;
    font-size: .82rem;
    line-height: 1.75;
    color: #2a4a3b;
  }

  .highlight strong { color: #1D6A45; }

  /* ── FACT BOX ────────────────────────────────────── */
  .fact-box {
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 18px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .fact-box.orange { background: #FFF5EF; border: 1px solid #FDDCCA; }
  .fact-box.blue   { background: #EFF7FF; border: 1px solid #C5DEFF; }
  .fact-box.green  { background: #EFFAF4; border: 1px solid #B5E5CA; }
  .fact-box.red    { background: #FFF0EE; border: 1px solid #FFCCC5; }

  .fact-icon { font-size: 1.5rem; line-height: 1; }

  .fact-body { flex: 1; }
  .fact-body strong { display: block; font-size: .82rem; font-weight: 700; margin-bottom: 4px; color: var(--ink); }
  .fact-body p { font-size: .8rem; line-height: 1.7; color: #444; margin: 0; }

  /* ── NAV BUTTONS ─────────────────────────────────── */
  .nav-buttons {
    display: flex;
    gap: 10px;
    padding: 0 40px 56px;
    align-items: center;
  }

  .btn {
    padding: 10px 24px;
    border-radius: 999px;
    border: none;
    cursor: pointer;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: .82rem;
    font-weight: 700;
    transition: all .15s;
    letter-spacing: .02em;
  }

  .btn-prev {
    background: #fff;
    color: var(--ink);
    border: 1px solid var(--line);
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .btn-prev:hover { background: var(--sand); }

  .btn-next {
    background: var(--ink);
    color: #fff;
    box-shadow: 0 2px 10px rgba(0,0,0,.2);
  }
  .btn-next:hover { background: #333; }

  .page-counter {
    margin-left: auto;
    font-size: .78rem;
    color: var(--muted);
    font-weight: 600;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 5px 14px;
  }

  /* ── MOBILE TOGGLE ───────────────────────────────── */
  #menu-toggle {
    display: none;
    position: fixed;
    top: 14px; left: 14px;
    z-index: 200;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 10px;
    width: 42px; height: 42px;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,.3);
  }

  @media (max-width: 768px) {
    #sidebar { transform: translateX(-272px); }
    #sidebar.open { transform: translateX(0); box-shadow: 4px 0 32px rgba(0,0,0,.3); }
    #main { margin-left: 0; }
    .hero { height: 240px; }
    .hero-overlay { padding: 20px 22px; }
    .hero h1 { font-size: 1.5rem; }
    .page-content { padding: 22px 20px 44px; }
    .nav-buttons { padding: 0 20px 40px; }
    .two-col { grid-template-columns: 1fr; }
    .photo-strip.cols-3 { grid-template-columns: 1fr 1fr; }
    #menu-toggle { display: flex !important; }
  }
</style>
</head>
<body>

<button id="menu-toggle" onclick="toggleNav()">☰</button>

<nav id="sidebar">
  <div class="sidebar-logo">
    <span>📚 Ringkasan Ujian</span>
    <h2>Kisi-Kisi Geografi</h2>
  </div>
  <div id="nav-links"></div>
</nav>

<main id="main">
  <div id="pages"></div>
</main>

<script>
const topics = [
  {
    id: 1,
    title: "Pergerakan Lempeng Bumi & Hasilnya",
    theme: "theme-litosfer",
    tclass: "t-litosfer",
    badge: "🪨 Litosfer",
    subtitle: "Teori tektonik lempeng, jenis pergerakan, dan dampak geologi yang dihasilkan.",
    hero: "https://images.unsplash.com/photo-1625758093888-b7ef417fcb93?w=1200&q=80",
    photos: [
      { src: "https://images.unsplash.com/photo-1616400619175-5beda3a17896?w=600&q=80", cap: "Zona subduksi menghasilkan palung laut dalam" },
      { src: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&q=80", cap: "Rift Valley di Afrika Timur — divergensi lempeng" },
      { src: "https://images.unsplash.com/photo-1604537529428-15bcbeecfe4d?w=600&q=80", cap: "Sesar San Andreas — lempeng transform" },
    ],
    content: `
      <div class="card">
        <h3><span>🌐</span> Tiga Jenis Pergerakan Lempeng</h3>
        <div class="def-list">
          <div class="def-item">
            <div class="def-term">1. Konvergen (Saling Mendekat)</div>
            <div class="def-desc">Dua lempeng bergerak saling mendekati. Menghasilkan: subduksi (lempeng samudra menunjam ke bawah lempeng benua), pembentukan pegunungan (orogeni), palung laut, gunung berapi. Contoh: Palung Jawa, Pegunungan Himalaya.</div>
          </div>
          <div class="def-item">
            <div class="def-term">2. Divergen (Saling Menjauh)</div>
            <div class="def-desc">Dua lempeng saling menjauh. Menghasilkan: pematang tengah samudra (mid-ocean ridge), pembentukan kerak bumi baru, Lembah Retakan (Rift Valley) seperti di Afrika Timur.</div>
          </div>
          <div class="def-item">
            <div class="def-term">3. Transform (Sesar Geser)</div>
            <div class="def-desc">Dua lempeng bergerak secara horizontal/menyamping satu sama lain. Menghasilkan: sesar/patahan aktif, gempa bumi. Contoh: Sesar San Andreas (Amerika Serikat).</div>
          </div>
        </div>
      </div>
      <div class="card">
        <h3><span>🏔️</span> Hasil Pergerakan Lempeng</h3>
        <div class="pill-list">
          <span class="pill">Pegunungan lipatan</span>
          <span class="pill">Palung laut</span>
          <span class="pill">Gunung berapi</span>
          <span class="pill">Gempa bumi</span>
          <span class="pill">Pematang tengah samudra</span>
          <span class="pill">Rift Valley</span>
          <span class="pill">Zona subduksi</span>
          <span class="pill">Pulau vulkanik</span>
        </div>
      </div>`
  },
  {
    id: 2,
    title: "Lempeng di Kawasan Indonesia",
    theme: "theme-litosfer",
    tclass: "t-litosfer",
    badge: "🪨 Litosfer",
    subtitle: "Indonesia berada di pertemuan tiga lempeng utama — sangat rawan bencana geologi.",
    hero: "https://images.unsplash.com/photo-1580139885280-7bb7379bae5e?w=1200&q=80",
    photos: [
      { src: "https://images.unsplash.com/photo-1510218830377-2e994ea9087d?w=600&q=80", cap: "Ring of Fire — Cincin Api Pasifik" },
      { src: "https://images.unsplash.com/photo-1518998053901-5348d3961a04?w=600&q=80", cap: "Gempa dan tsunami akibat tumbukan lempeng" },
    ],
    content: `
      <div class="card">
        <h3><span>🗺️</span> Tiga Lempeng Utama di Indonesia</h3>
        <div class="def-list">
          <div class="def-item">
            <div class="def-term">1. Lempeng Indo-Australia</div>
            <div class="def-desc">Bergerak ke arah utara sekitar 7 cm/tahun. Menunjam (subduksi) ke bawah Lempeng Eurasia di selatan Pulau Jawa dan Sumatra, membentuk Palung Jawa dan rangkaian gunung berapi.</div>
          </div>
          <div class="def-item">
            <div class="def-term">2. Lempeng Eurasia</div>
            <div class="def-desc">Lempeng benua yang relatif stabil. Indonesia bagian barat (Sumatra, Jawa, Kalimantan) berdiri di atas lempeng ini.</div>
          </div>
          <div class="def-item">
            <div class="def-term">3. Lempeng Pasifik</div>
            <div class="def-desc">Bergerak ke arah barat-barat laut. Bertumbukan dengan Lempeng Eurasia di wilayah Indonesia timur (Papua, Maluku, Sulawesi), menghasilkan kompleksitas tektonik yang tinggi.</div>
          </div>
        </div>
      </div>
      <div class="card">
        <h3><span>⚠️</span> Dampak bagi Indonesia</h3>
        <p>Pertemuan tiga lempeng menjadikan Indonesia berada di <strong>Ring of Fire (Cincin Api Pasifik)</strong>.</p>
        <div class="pill-list">
          <span class="pill red">Sering gempa bumi</span>
          <span class="pill red">Tsunami (gempa dasar laut)</span>
          <span class="pill red">Banyak gunung berapi aktif (±127)</span>
          <span class="pill green">Tanah vulkanik subur</span>
          <span class="pill green">Sumber daya mineral kaya</span>
        </div>
      </div>`
  },
  {
    id: 3,
    title: "Jenis Batuan dalam Kehidupan Sehari-hari",
    theme: "theme-litosfer",
    tclass: "t-litosfer",
    badge: "🪨 Litosfer",
    subtitle: "Batu apung, kapur, dan marmer — tergolong dalam jenis batuan apa?",
    hero: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=1200&q=80",
    photos: [
      { src: "https://images.unsplash.com/photo-1564419320461-6870880221ad?w=600&q=80", cap: "Batu apung (pumice) — batuan beku" },
      { src: "https://images.unsplash.com/photo-1617817546887-c84aa6d8c44c?w=600&q=80", cap: "Marmer — batuan metamorf" },
      { src: "https://images.unsplash.com/photo-1578662996442-48f60103fc96?w=600&q=80", cap: "Batu kapur — batuan sedimen" },
    ],
    content: `
      <div class="card">
        <h3><span>🪨</span> Tiga Jenis Batuan Utama</h3>
        <table class="compare-table">
          <tr><th>Jenis</th><th>Proses Pembentukan</th><th>Contoh</th></tr>
          <tr><td><strong>Batuan Beku (Igneous)</strong></td><td>Pendinginan dan pembekuan magma/lava</td><td>Granit, Basalt, <strong>Batu Apung</strong>, Obsidian</td></tr>
          <tr><td><strong>Batuan Sedimen</strong></td><td>Pengendapan & pemadatan material</td><td><strong>Batu Kapur (Gamping)</strong>, Batu Pasir, Batu Bara, Konglomerat</td></tr>
          <tr><td><strong>Batuan Metamorf</strong></td><td>Perubahan batuan akibat panas & tekanan tinggi</td><td><strong>Marmer</strong> (dari batu kapur), Batu Sabak, Kuarsit</td></tr>
        </table>
      </div>
      <div class="card">
        <h3><span>🔍</span> Penjelasan Spesifik</h3>
        <div class="def-list">
          <div class="def-item">
            <div class="def-term">Batu Apung → Batuan Beku</div>
            <div class="def-desc">Terbentuk dari lava yang mendingin sangat cepat dengan banyak gelembung gas. Ringan dan berpori sehingga bisa mengapung di air. Digunakan sebagai bahan pengamplas dan industri bangunan.</div>
          </div>
          <div class="def-item">
            <div class="def-term">Batu Kapur (Gamping) → Batuan Sedimen</div>

          <div class="def-item"><div class="def-term">Evaporasi</div><div class="def-desc">Penguapan air dari permukaan air (laut, danau, sungai, dll.) menjadi uap air di atmosfer akibat panas matahari.</div></div>
          <div class="def-item"><div class="def-term">Evapotranspirasi</div><div class="def-desc">Gabungan evaporasi + transpirasi (penguapan melalui daun tanaman). Total kehilangan air dari permukaan bumi ke atmosfer.</div></div>
          <div class="def-item"><div class="def-term">Kondensasi</div><div class="def-desc">Proses berubahnya uap air menjadi tetesan air cair saat udara mendingin di bawah titik embun (dew point). Menghasilkan awan, embun, kabut.</div></div>
          <div class="def-item"><div class="def-term">Adveksi</div><div class="def-desc">Pergerakan horizontal massa udara atau air yang membawa panas/uap air dari satu tempat ke tempat lain. Berbeda dengan konveksi (vertikal).</div></div>
          <div class="def-item"><div class="def-term">Run-off (Limpasan)</div><div class="def-desc">Air hujan yang mengalir di atas permukaan tanah (tidak meresap) menuju sungai, danau, atau laut. Dipengaruhi: kemiringan, permeabilitas tanah, vegetasi, curah hujan.</div></div>
          <div class="def-item"><div class="def-term">Infiltrasi</div><div class="def-desc">Air hujan yang meresap masuk ke dalam tanah menjadi air tanah.</div></div>
          <div class="def-item"><div class="def-term">Transpirasi</div><div class="def-desc">Penguapan air melalui stomata (pori-pori) daun tanaman.</div></div>

/* ── GROUP NAV BY THEME ──────────────────────────────── */
const groups = [
  { label: "🪨 Litosfer", cls: "t-litosfer", ids: [1,2,3,4,8] },
  { label: "🌋 Vulkanisme", cls: "t-vulkan",   ids: [5,6,7] },
  { label: "🌤️ Atmosfer",  cls: "t-atmosfer",  ids: [10,11,12,13,14,15] },
  { label: "💧 Hidrosfer", cls: "t-hidrosfer",  ids: [9,16,17,18,19,20] },
];

const navLinks = document.getElementById('nav-links');
const pagesEl  = document.getElementById('pages');

const topicMap = {};
topics.forEach(t => topicMap[t.id] = t);

// Build nav
groups.forEach(g => {
  const lbl = document.createElement('div');
  lbl.className = 'section-label';
  lbl.textContent = g.label;
  navLinks.appendChild(lbl);

  g.ids.forEach(id => {
    const t = topicMap[id];
    if (!t) return;
    const el = document.createElement('div');
    el.className = `nav-item ${g.cls}`;
    el.id = `nav-${id}`;
    el.innerHTML = `<span class="nav-num">${id}</span><span>${t.title}</span>`;
    el.onclick = () => showPage(id);
    navLinks.appendChild(el);
  });
});

// Build pages
const orderedIds = topics.map(t => t.id);

topics.forEach((t, idx) => {
  const div = document.createElement('div');
  div.className = `page ${t.theme}`;
  div.id = `page-${t.id}`;

  const cols = t.photos.length === 2 ? 'cols-2' : 'cols-3';
  const photoHTML = t.photos.map(p => `
    <figure class="photo-box">
      <img src="${p.src}" alt="${p.cap}" loading="lazy">
      <figcaption>${p.cap}</figcaption>
    </figure>`).join('');

  const prevId = idx > 0 ? topics[idx - 1].id : null;
  const nextId = idx < topics.length - 1 ? topics[idx + 1].id : null;

  div.innerHTML = `
    <div class="hero">
      <img class="hero-img" src="${t.hero}" alt="${t.title}">
      <div class="hero-overlay">
        <div class="hero-badge">${t.badge} &nbsp;· Topik ${t.id} dari ${topics.length}</div>
        <h1>${t.title}</h1>
        <p>${t.subtitle}</p>
      </div>
    </div>
    <div class="page-content">
      <div class="photo-strip ${cols}">${photoHTML}</div>
      ${t.content}
    </div>
    <div class="nav-buttons">
      ${prevId ? `<button class="btn btn-prev" onclick="showPage(${prevId})">← Sebelumnya</button>` : ''}
      ${nextId ? `<button class="btn btn-next" onclick="showPage(${nextId})">Berikutnya →</button>` : `<button class="btn btn-next" style="background:#27AE60;cursor:default">✓ Selesai!</button>`}
      <span class="page-counter">${idx + 1} / ${topics.length}</span>
    </div>
  `;
  pagesEl.appendChild(div);
});

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const page = document.getElementById(`page-${id}`);
  const nav  = document.getElementById(`nav-${id}`);
  if (page) page.classList.add('active');
  if (nav) nav.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  document.getElementById('sidebar').classList.remove('open');
}

function toggleNav() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Show first topic by default
showPage(topics[0].id);
</script>
